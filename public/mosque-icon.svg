<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Definitions for gradients and drop shadows -->
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </radialGradient>
    
    <!-- Gold / Golden Hour Gradient for Mosque -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D" />
      <stop offset="50%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#B45309" />
    </linearGradient>

    <!-- Emerald / Teal Gradient for secondary elements -->
    <linearGradient id="emeraldGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="100%" stop-color="#34D399" />
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Circular background for the icon -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  
  <!-- Outer Glow Orbs/Stars -->
  <circle cx="100" cy="120" r="2" fill="#fff" opacity="0.3" />
  <circle cx="400" cy="160" r="3" fill="#fff" opacity="0.4" />
  <circle cx="150" cy="220" r="1.5" fill="#fff" opacity="0.2" />
  <circle cx="360" cy="80" r="2" fill="#fff" opacity="0.5" />
  
  <!-- Modern Geometric Islamic Pattern Sub-layer -->
  <g opacity="0.05" stroke="#fff" stroke-width="1">
    <!-- Concentric circles and lines for a subtle geometric backdrop -->
    <circle cx="256" cy="256" r="200" fill="none" />
    <circle cx="256" cy="256" r="160" fill="none" />
    <line x1="56" y1="256" x2="456" y2="256" />
    <line x1="256" y1="56" x2="256" y2="456" />
    <line x1="114" y1="114" x2="398" y2="398" />
    <line x1="114" y1="398" x2="398" y2="114" />
  </g>

  <!-- Elegant Crescent Moon -->
  <path d="M 285 75 A 35 35 0 1 0 340 120 A 30 30 0 1 1 285 75 Z" fill="url(#goldGrad)" filter="url(#glow)" />

  <!-- Mosque Silhouette -->
  <!-- Main building base -->
  <path d="M 120 400 L 392 400 L 392 340 A 12 12 0 0 0 380 328 L 132 328 A 12 12 0 0 0 120 340 Z" fill="url(#emeraldGrad)" />

  <!-- Left Minaret -->
  <path d="M 80 400 L 110 400 L 105 200 L 85 200 Z" fill="url(#goldGrad)" />
  <path d="M 80 200 L 110 200 L 110 180 L 80 180 Z" fill="url(#emeraldGrad)" />
  <path d="M 85 180 L 105 180 L 95 150 Z" fill="url(#goldGrad)" />
  
  <!-- Right Minaret -->
  <path d="M 402 400 L 432 400 L 427 200 L 407 200 Z" fill="url(#goldGrad)" />
  <path d="M 402 200 L 432 200 L 432 180 L 402 180 Z" fill="url(#emeraldGrad)" />
  <path d="M 407 180 L 427 180 L 417 150 Z" fill="url(#goldGrad)" />

  <!-- Side Domes -->
  <!-- Left Side Dome -->
  <path d="M 130 328 A 40 40 0 0 1 210 328 Z" fill="url(#goldGrad)" />
  <!-- Right Side Dome -->
  <path d="M 302 328 A 40 40 0 0 1 382 328 Z" fill="url(#goldGrad)" />

  <!-- Central Main Dome (The Grand Dome) -->
  <path d="M 200 328 A 56 56 0 0 1 312 328 Z" fill="url(#goldGrad)" />
  <!-- Main dome pinnacle/crescent base -->
  <line x1="256" y1="272" x2="256" y2="245" stroke="url(#goldGrad)" stroke-width="4" />
  <circle cx="256" cy="242" r="4" fill="url(#goldGrad)" />
  <circle cx="256" cy="232" r="3" fill="url(#goldGrad)" />

  <!-- Grand Entrance Archway -->
  <path d="M 230 400 L 230 355 A 26 26 0 0 1 282 355 L 282 400 Z" fill="#040d21" />
  
  <!-- Decorative Arch Grid -->
  <path d="M 240 400 L 240 365 A 16 16 0 0 1 272 365 L 272 400 Z" fill="none" stroke="url(#goldGrad)" stroke-width="2" opacity="0.6" />

  <!-- Windows/Details -->
  <path d="M 155 375 L 155 350 A 10 10 0 0 1 175 350 L 175 375 Z" fill="#040d21" />
  <path d="M 337 375 L 337 350 A 10 10 0 0 1 357 350 L 357 375 Z" fill="#040d21" />
</svg>
